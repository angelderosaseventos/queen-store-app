<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d0d14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Queen Store">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%230d0d14' width='192' height='192'/><text x='50%' y='50%' font-size='100' font-weight='bold' fill='%23f0c060' text-anchor='middle' dominant-baseline='middle' font-family='Arial'>♣</text></svg>">
<title>Queen Store — Comodines y Rifas</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');
:root {
  --bg:#0d0d14;--surface:#16161f;--surface2:#1e1e2a;--surface3:#252535;
  --border:#2a2a3d;--gold:#f0c060;--gold-dim:#a07830;--green:#3ddc84;
  --green-dim:#1a5c3a;--red:#ff5566;--red-dim:#5c1a22;--blue:#6688ff;
  --purple:#cc88ff;--purple-dim:#4a1a6a;
  --text:#e8e8f0;--text-dim:#8888aa;--text-muted:#4a4a6a;
  --radius:12px;--radius-sm:7px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);display:flex;align-items:flex-start;justify-content:center;z-index:9999;backdrop-filter:blur(8px);overflow-y:auto;padding:20px 12px;}
.modal-overlay.hidden{display:none;}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px 32px;width:640px;max-width:97vw;box-shadow:0 40px 80px rgba(0,0,0,0.6);margin:auto;}
.fg{margin-bottom:11px;}
.fg label{display:block;font-size:11px;color:var(--text-dim);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px;}
.fg input,.fg select,.fg textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:9px 12px;font-size:13px;font-family:inherit;outline:none;transition:border .2s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--gold);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.logo-drop{border:2px dashed var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center;cursor:pointer;color:var(--text-dim);font-size:12px;background:var(--surface2);transition:all .2s;}
.logo-drop:hover{border-color:var(--gold);color:var(--gold);}
.sec-lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin:18px 0 10px;border-bottom:1px solid var(--border);padding-bottom:5px;}
.btn-primary{width:100%;background:var(--gold);color:#0d0d14;border:none;border-radius:var(--radius-sm);padding:13px;font-size:15px;font-weight:700;font-family:'Space Grotesk',sans-serif;cursor:pointer;transition:all .2s;margin-top:16px;}
.btn-primary:hover{background:#ffd070;}
.btn-sm{padding:8px 14px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .18s;display:inline-flex;align-items:center;gap:6px;font-family:inherit;white-space:nowrap;}
.btn-gold{background:var(--gold);color:#0d0d14;}.btn-gold:hover{background:#ffd070;}
.btn-outline{background:transparent;color:var(--text-dim);border:1px solid var(--border);}.btn-outline:hover{border-color:var(--gold);color:var(--gold);}
.btn-green{background:var(--green);color:#0d1a10;}.btn-green:hover{background:#5aeea0;}
.btn-blue{background:var(--blue);color:#fff;}.btn-blue:hover{background:#8899ff;}
.btn-red{background:rgba(255,85,102,0.15);color:var(--red);border:1px solid var(--red-dim);}.btn-red:hover{background:rgba(255,85,102,0.3);}
.btn-icon{background:none;border:1px solid var(--border);border-radius:5px;color:var(--text-dim);width:28px;height:28px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s;}
.btn-icon:hover{border-color:var(--red);color:var(--red);background:rgba(255,85,102,.1);}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:13px 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:10px;}
.topbar-title{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700;color:var(--gold);}
.topbar-meta{font-size:11px;color:var(--text-dim);margin-top:2px;}
.app-body{display:grid;grid-template-columns:1fr;min-height:calc(100vh - 62px);}
.main-panel{padding:20px;overflow-x:auto;}
.tabs{display:flex;gap:4px;margin-bottom:18px;}
.tab-btn{padding:8px 18px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit;}
.tab-btn.active{background:var(--gold);color:#0d0d14;border-color:var(--gold);font-weight:700;}
.tab-btn:hover:not(.active){border-color:var(--gold);color:var(--gold);}
.tab-panel{display:none;}.tab-panel.active{display:block;}
/* TABLERO */
.grid-numeros{display:grid;grid-template-columns:repeat(auto-fill,minmax(52px,1fr));gap:6px;margin-top:15px;max-height:420px;overflow-y:auto;padding-right:5px;}
.num-btn{aspect-ratio:1;border-radius:5px;background:var(--surface3);border:1px solid var(--border);color:var(--text);font-weight:700;cursor:pointer;transition:all .15s;font-size:15px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;}
.num-btn:hover:not(.vendido){border-color:var(--gold);color:var(--gold);}
.num-btn.vendido{border-color:rgba(255,255,255,0.2);color:#fff;text-shadow:0px 1px 3px rgba(0,0,0,0.8);}
.num-btn.ganador{box-shadow:0 0 12px var(--green);border:2px solid var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(61,220,132,0.7);}70%{box-shadow:0 0 0 10px rgba(61,220,132,0);}100%{box-shadow:0 0 0 0 rgba(61,220,132,0);}}
.num-owner{font-size:8px;color:#fff;background:rgba(0,0,0,0.65);padding:1px 3px;border-radius:3px;position:absolute;bottom:2px;max-width:92%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.num-btn.mitad{border:2px dashed rgba(255,255,255,0.55);}
.num-btn.mitad::after{content:'½';position:absolute;top:2px;right:3px;font-size:8px;background:rgba(0,0,0,0.65);color:#fff;border-radius:3px;padding:0 2px;}
#btn-mitades.activo{background:var(--gold);color:#0d0d14;border-color:var(--gold);}
/* PREMIOS EN TABLERO */
.premio-row{display:grid;grid-template-columns:1.5fr 1fr 70px 80px 30px;gap:10px;margin-bottom:8px;align-items:center;background:var(--surface3);padding:10px;border-radius:var(--radius-sm);}
.premio-row input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:6px 8px;font-size:12px;font-family:inherit;outline:none;}
.premio-row input:focus{border-color:var(--gold);}
.bolita{width:36px;height:36px;border-radius:50%;color:#fff;font-weight:900;font-size:14px;display:inline-flex;align-items:center;justify-content:center;box-shadow:0 4px 8px rgba(0,0,0,0.5);border:2px solid rgba(255,255,255,0.3);}
/* TABLA RESUMEN */
.tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);margin-top:15px;}
table{border-collapse:collapse;width:100%;}
thead tr{background:var(--surface3);}
th{padding:10px 11px;text-align:left;font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);}
td{padding:8px 11px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle;}
tbody tr:hover{background:var(--surface2);}
tbody tr:last-child td{border-bottom:none;}
.badge-cobrar{background:var(--red-dim);color:var(--red);font-weight:700;border-radius:5px;padding:3px 9px;font-size:11px;display:inline-block;}
.badge-pagar{background:var(--green-dim);color:var(--green);font-weight:700;border-radius:5px;padding:3px 9px;font-size:11px;display:inline-block;}
/* STATS */
.sum-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:18px;}
.sum-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;}
.sum-block.full{grid-column:1/-1;}
.sb-lbl{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim);margin-bottom:5px;font-weight:600;}
.sb-val{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;}
.dr-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;}
.dr-row:last-child{border-bottom:none;}
/* STAT SIDE */
.stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;}
.stat-card .sl{font-size:10px;color:var(--text-dim);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px;}
.stat-card .sv{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;}
.stat-card.gold{border-color:rgba(240,192,96,.3);}.stat-card.gold .sv{color:var(--gold);}
.stat-card.green{border-color:rgba(61,220,132,.3);}.stat-card.green .sv{color:var(--green);}
.stat-card.red{border-color:rgba(255,85,102,.3);}.stat-card.red .sv{color:var(--red);}
.stat-card.blue{border-color:rgba(102,136,255,.3);}.stat-card.blue .sv{color:var(--blue);}
/* VOUCHER EDITOR */
.vch-editor{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:12px;}
.vch-editor label{display:block;font-size:10px;color:var(--text-dim);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;}
.vch-editor input[type=text],.vch-editor textarea{width:100%;background:var(--surface3);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:7px 10px;font-size:12px;font-family:inherit;outline:none;margin-bottom:0;}
.vch-editor input[type=text]:focus,.vch-editor textarea:focus{border-color:var(--gold);}
.color-picker-list{max-height:300px;overflow-y:auto;padding-right:8px;}
.vch-preview-wrap{max-height:500px;overflow-y:auto;padding-right:5px;}
.cp-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.cp-row:last-child{border-bottom:none;}
.cp-row:hover{background:rgba(255,255,255,.03);border-radius:5px;padding-left:4px;}
.cp-dot{width:12px;height:12px;border-radius:50%;border:1px solid rgba(255,255,255,.2);flex-shrink:0;display:inline-block;}
.cp-lbl{flex:1;font-size:11px;color:var(--text-dim);}
.cp-tag{font-size:9px;padding:2px 5px;border-radius:3px;font-weight:700;letter-spacing:.5px;}
.cp-tag.cobro{background:rgba(255,85,102,.15);color:var(--red);}
.cp-tag.pago{background:rgba(61,220,132,.15);color:var(--green);}
.cp-tag.header{background:rgba(240,192,96,.15);color:var(--gold);}
.cp-tag.all{background:rgba(102,136,255,.15);color:var(--blue);}
.vch-apply-scope{display:flex;gap:6px;margin-top:8px;}
.scope-btn{padding:5px 10px;border-radius:4px;border:1px solid rgba(240,192,96,.3);background:transparent;color:var(--gold);font-size:11px;cursor:pointer;font-weight:600;transition:all .15s;}
.scope-btn:hover{background:rgba(240,192,96,.15);border-color:var(--gold);}
.scope-btn.active{background:var(--gold);color:#0d0d14;border-color:var(--gold);}
.toast{position:fixed;bottom:20px;left:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;color:var(--text);font-size:13px;z-index:10000;animation:slideIn .25s ease;max-width:calc(100vw - 40px);}
@keyframes slideIn{from{transform:translateX(-100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
.toast.hidden{display:none;}
.toast.success{border-color:var(--green-dim);background:rgba(61,220,132,.1);}
.toast.error{border-color:var(--red-dim);background:rgba(255,85,102,.1);}
@media(max-width:700px){
  .modal-box{padding:20px 20px;width:100vw;}
  .premio-row{grid-template-columns:1fr 60px 70px 30px;}.premium-row input{font-size:11px;}
  .grid-numeros{grid-template-columns:repeat(auto-fill,minmax(48px,1fr));}
}
</style>
</head>
<body>
<div id="toast" class="toast hidden"><span id="t-msg"></span></div>

<!-- TOPBAR -->
<div class="topbar">
  <div>
    <div class="topbar-title">♣ Queen Store</div>
    <div class="topbar-meta">Comodines & Rifas Manager</div>
  </div>
  <button class="btn-sm btn-outline" onclick="abrir('modal-cfg')">⚙ Config</button>
</div>

<!-- APP BODY -->
<div class="app-body">
  <div class="main-panel">

    <!-- TABS -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('tab-tablero',this)">📊 Tablero</button>
      <button class="tab-btn" onclick="switchTab('tab-jugadas',this)">👥 Jugadas</button>
      <button class="tab-btn" onclick="switchTab('tab-premios',this)">🏆 Premios</button>
      <button class="tab-btn" onclick="switchTab('tab-voucher',this)">🎟 Vouchers</button>
      <button class="tab-btn" onclick="switchTab('tab-export',this)">📥 Export</button>
    </div>

    <!-- TAB: TABLERO -->
    <div id="tab-tablero" class="tab-panel active">
      <div style="margin-bottom:18px;">
        <label for="sel-comodin" style="font-size:12px;color:var(--text-dim);margin-bottom:6px;display:block;font-weight:500;">Selecciona Comodín:</label>
        <select id="sel-comodin" onchange="actualizarTablero()" style="width:100%;padding:9px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;font-family:inherit;outline:none;">
          <option value="">-- Nuevo Comodín --</option>
        </select>
      </div>
      <button class="btn-sm btn-gold" onclick="abrir('modal-cfg')">➕ Nuevo Comodín</button>

      <div id="tablero-container" style="margin-top:20px;"></div>
    </div>

    <!-- TAB: JUGADAS -->
    <div id="tab-jugadas" class="tab-panel">
      <button class="btn-sm btn-green" onclick="abrir('modal-jugadas')">➕ Nueva Jugada</button>
      <div class="tbl-wrap" style="margin-top:15px;">
        <table id="tbl-jugadas">
          <thead><tr><th>Jugador</th><th>Comodín</th><th>Números</th><th>Monto</th><th></th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- TAB: PREMIOS -->
    <div id="tab-premios" class="tab-panel">
      <div id="premios-container"></div>
    </div>

    <!-- TAB: VOUCHERS -->
    <div id="tab-voucher" class="tab-panel">
      <div id="vch-list"></div>
    </div>

    <!-- TAB: EXPORT -->
    <div id="tab-export" class="tab-panel">
      <div class="sum-grid">
        <div class="sum-block full">
          <div class="sb-lbl">Exportar Datos</div>
          <button class="btn-sm btn-gold" onclick="exportJSON()" style="margin-top:8px;">📥 Descargar JSON</button>
          <button class="btn-sm btn-blue" onclick="document.getElementById('import-file').click();" style="margin-top:8px;">📤 Importar JSON</button>
          <input id="import-file" type="file" accept=".json" onchange="importJSON(event)" style="display:none;">
          <button class="btn-sm btn-red" onclick="if(confirm('¿Borrar TODO?')){S={cliente:'',comodines:[],jugadas:{},vouchers:[]};guardar();location.reload();}" style="margin-top:8px;">🗑 Limpiar Todo</button>
        </div>
      </div>
      <div class="sum-grid" id="resumen-stats" style="margin-top:20px;"></div>
    </div>

  </div>
</div>

<!-- MODALS -->
<!-- CONFIG MODAL -->
<div id="modal-cfg" class="modal-overlay hidden">
  <div class="modal-box">
    <h2 style="margin-bottom:16px;color:var(--gold);">⚙ Configuración</h2>
    <div class="fg"><label>Cliente:</label><input type="text" id="inp-cliente" placeholder="Nombre del cliente"></div>
    <div class="fg"><label>Comodín Nuevo (Nombre):</label><input type="text" id="inp-comodin-nombre" placeholder="ej. Rifa A"></div>
    <div class="fg"><label>Números (máximo):</label><input type="number" id="inp-comodin-max" value="50" min="1"></div>
    <button class="btn-primary" onclick="crearComodin()">✓ Crear Comodín</button>
    <hr style="border:none;border-top:1px solid var(--border);margin:16px 0;">
    <h3 style="font-size:13px;margin-bottom:10px;color:var(--gold);">Comodines Existentes</h3>
    <div id="comodines-list"></div>
    <button class="btn-primary" style="background:var(--blue);margin-top:20px;" onclick="cerrar('modal-cfg')">✓ Cerrar</button>
  </div>
</div>

<!-- JUGADAS MODAL -->
<div id="modal-jugadas" class="modal-overlay hidden">
  <div class="modal-box">
    <h2 style="margin-bottom:16px;color:var(--gold);">👥 Nueva Jugada</h2>
    <div class="fg"><label>Jugador:</label><input type="text" id="inp-jug-nombre" placeholder="Nombre del jugador"></div>
    <div class="fg"><label>Comodín:</label><select id="inp-jug-comodin"></select></div>
    <div class="fg"><label>Números (separado por comas):</label><input type="text" id="inp-jug-nums" placeholder="1,2,3,10"></div>
    <div class="fg"><label>Monto:</label><input type="number" id="inp-jug-monto" value="0" min="0"></div>
    <button class="btn-primary" onclick="guardarJugada()">✓ Guardar</button>
    <button class="btn-primary" style="background:var(--text-dim);margin-top:8px;" onclick="cerrar('modal-jugadas')">✗ Cancelar</button>
  </div>
</div>

<!-- VOUCHER MODAL -->
<div id="modal-vch" class="modal-overlay hidden">
  <div class="modal-box">
    <h2 style="margin-bottom:16px;color:var(--gold);">🎟 Editor de Vouchers</h2>
    <div class="vch-editor">
      <label>Nombre del Voucher:</label>
      <input type="text" id="vch-nombre" placeholder="Premio especial">
      <label style="margin-top:10px;">Descripción:</label>
      <textarea id="vch-desc" placeholder="Detalle del premio" rows="3"></textarea>
    </div>
    <div style="margin-top:12px;">
      <label style="font-size:11px;color:var(--text-dim);font-weight:600;text-transform:uppercase;">Color & Texto:</label>
      <div class="color-picker-list" id="vch-colors"></div>
    </div>
    <button class="btn-primary" onclick="guardarVoucher()">✓ Guardar</button>
    <button class="btn-primary" style="background:var(--text-dim);margin-top:8px;" onclick="cerrar('modal-vch')">✗ Cancelar</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
// ESTADO GLOBAL
let S={cliente:'',comodines:[],jugadas:{},vouchers:[]};

// INIT
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(e=>console.log('SW no disponible'));}
window.addEventListener('load',()=>{cargar();actualizarUI();});

// STORAGE
function cargar(){try{const d=localStorage.getItem('qs-data');if(d)S=JSON.parse(d);console.log('✓ Datos cargados');}catch(e){console.error('Error al cargar',e);}}
function guardar(){localStorage.setItem('qs-data',JSON.stringify(S));console.log('✓ Datos guardados');}

// COMODINES
function crearComodin(){const n=document.getElementById('inp-comodin-nombre').value.trim();const m=parseInt(document.getElementById('inp-comodin-max').value)||50;if(!n){toast('❌ Nombre requerido','error');return;}if(S.comodines.find(c=>c.nombre===n)){toast('❌ Nombre duplicado','error');return;}const id='cm_'+Date.now();S.comodines.push({id,nombre:n,max:m,premios:[]});guardar();actualizarUI();document.getElementById('inp-comodin-nombre').value='';document.getElementById('inp-comodin-max').value='50';cerrar('modal-cfg');toast('✓ Comodín creado','success');}

function actualizarTablero(){const id=document.getElementById('sel-comodin').value;const c=S.comodines.find(x=>x.id===id);const cont=document.getElementById('tablero-container');cont.innerHTML='';if(!c)return;let html=`<div style="display:grid;grid-template-columns:1.5fr 1fr;gap:20px;"><div><h3 style="color:var(--gold);margin-bottom:12px;font-size:15px;">📊 ${esc(c.nombre)}</h3><div class="grid-numeros">`;for(let i=1;i<=c.max;i++){const owners=[];for(let j in S.jugadas){if(S.jugadas[j][id]&&S.jugadas[j][id].includes(i))owners.push(j);}const mitad=[];for(let j in S.jugadas){if(S.jugadas[j][id]&&S.jugadas[j][id].includes(i+0.5))mitad.push(j);}const won=c.premios&&c.premios.some(p=>p.win===i);let cls='num-btn';let col='';if(owners.length){cls+=' vendido';col=getPlayerColor(owners[0]);}else if(mitad.length){cls+=' vendido mitad';const c1=getPlayerColor(mitad[0]);const c2=mitad[1]?getPlayerColor(mitad[1]):'rgba(255,255,255,0.08)';col=`linear-gradient(135deg, ${c1} 50%, ${c2} 50%)`;}if(won)cls+=' ganador';html+=`<div class="${cls}" style="background:${col};" onclick="marcarGanador(${i},'${id}')"><span>${i}</span>${owners.length?`<div class="num-owner">${owners.join(' ')}</div>`:''}${mitad.length&&!owners.length?`<div class="num-owner">${mitad.join(' / ')}</div>`:''}</div>`;}html+=`</div></div><div><div class="stat-card gold"><div class="sl">Vendidos</div><div class="sv">${Object.values(S.jugadas).reduce((a,j)=>a+(j[id]?j[id].length:0),0)}</div></div><div class="stat-card green"><div class="sl">Premios</div><div class="sv">${c.premios?c.premios.length:0}</div></div><button class="btn-sm btn-gold" style="width:100%;margin-top:10px;" onclick="abrir('modal-vch')">🎟 Voucher</button><button class="btn-sm btn-blue" style="width:100%;margin-top:8px;" onclick="generarYDescargarTableroJPG('${id}',false)">📷 JPG</button><button class="btn-sm btn-red" style="width:100%;margin-top:8px;" onclick="if(confirm('¿Borrar comodín?')){S.comodines=S.comodines.filter(x=>x.id!=='${id}');guardar();actualizarUI();cerrar('modal-cfg');}">🗑 Borrar</button></div></div>`;cont.innerHTML=html;}

function marcarGanador(n,id){const c=S.comodines.find(x=>x.id===id);if(!c)return;if(!c.premios)c.premios=[];if(c.premios.find(p=>p.win===n)){c.premios=c.premios.filter(p=>p.win!==n);}else{c.premios.push({win:n,color:'',nombre:''});}guardar();actualizarTablero();}

function getPlayerColor(nombre){const colors=['#6688ff','#cc88ff','#ff88cc','#ff8888','#ffaa66','#ffdd66','#88ff88','#66ffaa','#66ffff','#88ccff'];let hash=0;for(let i=0;i<nombre.length;i++)hash=((hash<<5)-hash)+nombre.charCodeAt(i);return colors[Math.abs(hash)%colors.length];}

function actualizarUI(){document.getElementById('inp-cliente').value=S.cliente;const sel=document.getElementById('sel-comodin');sel.innerHTML='<option value="">-- Nuevo Comodín --</option>';S.comodines.forEach(c=>{sel.innerHTML+=`<option value="${c.id}">${esc(c.nombre)}</option>`;});const list=document.getElementById('comodines-list');list.innerHTML='';S.comodines.forEach(c=>{list.innerHTML+=`<div style="background:var(--surface2);padding:8px;border-radius:5px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;"><span style="font-size:12px;">${esc(c.nombre)} (${c.max})</span><button class="btn-icon" onclick="seleccionarComodin('${c.id}')">✎</button></div>`;});const tbl=document.getElementById('tbl-jugadas');tbl.querySelector('tbody').innerHTML='';Object.entries(S.jugadas).forEach(([nom,dat])=>{const comodín=S.comodines.find(c=>c.id===Object.keys(dat).find(k=>typeof dat[k]==='object'));const nums=Object.entries(dat).filter(([k,v])=>Array.isArray(v)).map(([k,v])=>v.join(',')).join(' | ');tbl.querySelector('tbody').innerHTML+=`<tr><td>${esc(nom)}</td><td>${comodín?esc(comodín.nombre):'-'}</td><td style="font-size:11px;">${nums}</td><td>${fmt(dat.monto||0)}</td><td><button class="btn-icon" onclick="borrarJugada('${nom}')">✕</button></td></tr>`;});calcularResumen();}

function seleccionarComodin(id){document.getElementById('sel-comodin').value=id;actualizarTablero();}

function guardarJugada(){const nom=document.getElementById('inp-jug-nombre').value.trim();const cid=document.getElementById('inp-jug-comodin').value;const numsStr=document.getElementById('inp-jug-nums').value.trim();const monto=parseInt(document.getElementById('inp-jug-monto').value)||0;if(!nom||!cid||!numsStr){toast('❌ Datos incompletos','error');return;}const nums=numsStr.split(',').map(n=>n.trim()).map(n=>isNaN(n)?null:parseFloat(n)).filter(n=>n!==null);if(!nums.length){toast('❌ Números inválidos','error');return;}if(!S.jugadas[nom])S.jugadas[nom]={monto:0};S.jugadas[nom][cid]=nums;S.jugadas[nom].monto=monto;S.jugadas[nom].color=getPlayerColor(nom);guardar();actualizarUI();cerrar('modal-jugadas');document.getElementById('inp-jug-nombre').value='';document.getElementById('inp-jug-nums').value='';document.getElementById('inp-jug-monto').value='0';toast('✓ Jugada guardada','success');}

function borrarJugada(nom){if(confirm('¿Borrar jugada?')){delete S.jugadas[nom];guardar();actualizarUI();}}

// VOUCHERS
function guardarVoucher(){const n=document.getElementById('vch-nombre').value.trim();const d=document.getElementById('vch-desc').value.trim();if(!n){toast('❌ Nombre requerido','error');return;}const id='vch_'+Date.now();S.vouchers.push({id,nombre:n,desc:d,colors:[]});guardar();actualizarUI();cerrar('modal-vch');toast('✓ Voucher creado','success');}

// EXPORT/IMPORT
function exportJSON(){const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`qs_${S.cliente||'export'}_${Date.now()}.json`;a.click();}
function importJSON(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{S=JSON.parse(r.result);guardar();actualizarUI();toast('✓ Importado','success');e.target.value='';}catch(err){toast('❌ JSON inválido','error');}}; r.readAsText(f);}

// RESUMEN
function calcularResumen(){const cont=document.getElementById('resumen-stats');let vendidos=0,monto=0,premios=0;Object.values(S.jugadas).forEach(j=>{vendidos+=Object.entries(j).filter(([k,v])=>Array.isArray(v)).reduce((a,b)=>a+b[1].length,0);monto+=j.monto||0;});S.comodines.forEach(c=>{premios+=c.premios?c.premios.length:0;});cont.innerHTML=`<div class="sum-block gold"><div class="sb-lbl">Vendidos</div><div class="sb-val">${vendidos}</div></div><div class="sum-block green"><div class="sb-lbl">Montos</div><div class="sb-val">${fmt(monto)}</div></div><div class="sum-block blue"><div class="sb-lbl">Premios</div><div class="sb-val">${premios}</div></div>`;}

// IMAGE EXPORT
async function generarYDescargarTableroJPG(comodinId,conNombres){const c=S.comodines.find(x=>x.id===comodinId);if(!c)return;const cont=document.createElement('div');cont.style.cssText='background:#16161f;padding:20px;border-radius:8px;font-family:Inter,sans-serif;display:inline-block;';const h=document.createElement('div');h.style.cssText='color:#f0c060;margin-bottom:15px;padding-bottom:12px;border-bottom:2px solid #f0c060;text-align:center;';h.innerHTML=`<div style="font-size:18px;font-weight:700;margin-bottom:6px;">🎟️ ${esc(c.nombre)}</div>`;cont.appendChild(h);const g=document.createElement('div');g.style.cssText='display:grid;grid-template-columns:repeat(10,52px);gap:6px;';for(let i=1;i<=c.max;i++){const cl=document.createElement('div');cl.className='num-btn';cl.textContent=i;cl.style.position='relative';for(let j in S.jugadas){if(S.jugadas[j][comodinId]&&S.jugadas[j][comodinId].includes(i)){cl.classList.add('vendido');cl.style.background=getPlayerColor(j);break;}}g.appendChild(cl);}cont.appendChild(g);cont.style.position='fixed';cont.style.left='-9999px';document.body.appendChild(cont);await new Promise(r=>setTimeout(r,250));try{const canvas=await html2canvas(cont,{scale:2,useCORS:true,logging:false,backgroundColor:'#16161f'});document.body.removeChild(cont);const a=document.createElement('a');a.href=canvas.toDataURL('image/jpeg',0.95);a.download=`Tablero_${c.nombre.replace(/[^a-zA-Z0-9]/g,'_')}_${Date.now()}.jpg`;a.click();}catch(e){if(document.body.contains(cont))document.body.removeChild(cont);toast('❌ Error al exportar','error');}}

// UTILS
function switchTab(id,btn){document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.getElementById(id).classList.add('active');btn.classList.add('active');}
function abrir(id){document.getElementById(id).classList.remove('hidden');}
function cerrar(id){document.getElementById(id).classList.add('hidden');}
function fmt(n){return Math.round(n||0).toLocaleString('es-CL');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
let _tt;
function toast(msg,type){const t=document.getElementById('toast');document.getElementById('t-msg').textContent=msg;t.className='toast '+(type||'');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.add('hidden'),3500);}

// Modal click outside
['modal-cfg','modal-jugadas','modal-vch'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){if(e.target===this)cerrar(id);});
});
</script>
</body>
</html>
